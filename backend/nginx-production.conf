# ============================================
# NGINX PRODUCTION CONFIG - MITAAN EXPRESS
# Prevents 502 errors and handles backend crashes
# ============================================

# Rate limiting for API protection
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=health_limit:10m rate=30r/s;

# Backend API Server
server {
    listen 443 ssl http2;
    server_name api.mitaanexpress.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/api.mitaanexpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mitaanexpress.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Request body size (must match backend limit)
    client_max_body_size 500M;
    client_body_timeout 300s;
    client_header_timeout 300s;

    # Proxy timeouts - CRITICAL for preventing 502
    proxy_connect_timeout 75s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # Health endpoint with rate limiting
    location /health {
        # Apply rate limiting
        limit_req zone=health_limit burst=5 nodelay;
        
        # Proxy to backend with short timeout
        proxy_pass http://localhost:3000/health;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Short timeouts for health check
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        
        # Don't cache health responses
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        
        access_log off;
    }

    # API endpoints with enhanced error handling
    location /api/ {
        # Apply rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://mitaanexpress.com' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept, Origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            return 204;
        }

        # Proxy to backend with error handling
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (for Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # CORS headers for actual requests
        add_header 'Access-Control-Allow-Origin' 'https://mitaanexpress.com' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Set-Cookie' always;
        
        # Error handling
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_error;
    }

    # Backend error handler
    location @backend_error {
        internal;
        
        # Log the error
        access_log /var/log/nginx/backend_errors.log;
        
        # Return JSON error response
        add_header Content-Type application/json;
        add_header Access-Control-Allow-Origin 'https://mitaanexpress.com' always;
        add_header Access-Control-Allow-Credentials 'true' always;
        
        return 502 '{"error":"Backend temporarily unavailable","code":"BACKEND_UNAVAILABLE","retry_after":30}';
    }

    # Static uploads (bypass backend)
    location /uploads/ {
        alias /var/www/mitaan-express/backend/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # 404 handling for missing files
        try_files $uri =404;
    }

    # Root API redirect to health
    location = /api {
        return 302 /api/health;
    }

    # Block common attacks
    location ~* \.(aspx|asp|php|jsp|cgi)$ {
        deny all;
    }
    
    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name api.mitaanexpress.com;
    
    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ============================================
# FRONTEND SERVER CONFIG
# ============================================

server {
    listen 443 ssl http2;
    server_name mitaanexpress.com www.mitaanexpress.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/mitaanexpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mitaanexpress.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Frontend static files
    location / {
        root /var/www/mitaan-express/frontend/dist;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # API reverse proxy (same-origin - no CORS needed!)
    location /api/ {
        # Apply rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        # Proxy to backend
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Error handling
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_error;
    }
    
    # Health endpoint
    location /health {
        proxy_pass http://localhost:3000/health;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        access_log off;
    }
    
    # Backend error handler for frontend
    location @backend_error {
        internal;
        access_log /var/log/nginx/backend_errors.log;
        return 502 '{"error":"Backend temporarily unavailable","code":"BACKEND_UNAVAILABLE"}';
    }
}

# HTTP to HTTPS redirect for frontend
server {
    listen 80;
    server_name mitaanexpress.com www.mitaanexpress.com;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}
