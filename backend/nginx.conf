# ============================================
# NGINX CONFIG for Mitaan Express
# Place this in /etc/nginx/sites-available/mitaan-express
# Then: sudo ln -s /etc/nginx/sites-available/mitaan-express /etc/nginx/sites-enabled/
# ============================================

# Backend API Server
server {
    listen 443 ssl http2;
    server_name api.mitaanexpress.com;

    # SSL Configuration (adjust paths as needed)
    ssl_certificate /etc/letsencrypt/live/api.mitaanexpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mitaanexpress.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request body size (must match backend limit)
    client_max_body_size 500M;
    client_body_timeout 300s;
    client_header_timeout 300s;

    # Proxy timeouts
    proxy_connect_timeout 75s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # CORS Headers (adds extra safety layer)
    location / {
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://mitaanexpress.com' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept, Origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            return 204;
        }

        # Proxy to backend
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (for Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # CORS headers for actual requests
        add_header 'Access-Control-Allow-Origin' 'https://mitaanexpress.com' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Set-Cookie' always;
    }

    # Health check endpoint (no CORS needed)
    location /health {
        proxy_pass http://localhost:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Static uploads (bypass backend)
    location /uploads/ {
        alias /var/www/mitaan-express/backend/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Error handling
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 502 '{"error":"Bad Gateway","message":"Backend service unavailable"}';
        add_header Content-Type application/json;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name api.mitaanexpress.com;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

